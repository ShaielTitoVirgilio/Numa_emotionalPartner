<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Numa</title>
  <link rel="stylesheet" href="/static/styles.css" />
  <link rel="manifest" href="/static/manifest.json" />
  <meta name="theme-color" content="#7db89e" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Numa" />
  <link rel="apple-touch-icon" href="/static/icons/icon-192.png" />

  <style>
    /* ============================================
       TABS — Chat / Mi estado
       ============================================ */
    /* ── Barra de navegación: iconos de lado a lado, el activo se ensancha ── */
    .nav-bar {
      width: 100%;
      display: flex;
      align-items: stretch;
      gap: 0;                       /* sin huecos: cada botón ocupa su porción completa */
      background: #fff;
      border-radius: 18px;
      padding: 6px;
      margin-bottom: 8px;
      flex-shrink: 0;
      box-shadow: 0 2px 10px rgba(47, 79, 69, 0.08);
      overflow: hidden;
    }
    .nav-bar-item {
      flex: 1 1 0;                  /* reparto parejo del ancho, área táctil contigua */
      min-width: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 10px 4px;
      border: none;
      background: transparent;
      border-radius: 13px;
      color: #9bb3a8;              /* gris inactivo */
      cursor: pointer;
      transition: flex-grow 0.25s ease, background 0.2s ease, color 0.2s ease;
      -webkit-tap-highlight-color: transparent;
    }
    .nav-bar-item svg {
      width: 22px;
      height: 22px;
      flex-shrink: 0;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .nav-bar-item .nav-bar-label {
      font-size: 0.82rem;
      font-weight: 800;
      color: #2f4f45;
      white-space: nowrap;
      overflow: hidden;
      max-width: 0;
      opacity: 0;
      transition: max-width 0.25s ease, opacity 0.2s ease;  /* texto que se desliza */
    }
    .nav-bar-item.active {
      flex-grow: 2.4;
      background: #dceee7;
      color: #2f4f45;
    }
    .nav-bar-item.active .nav-bar-label {
      max-width: 110px;
      opacity: 1;
    }

    /* ── Toggle de tema: flotante en la vista de chat, debajo de la barra ── */
    .chat-theme-fab {
      position: absolute;
      top: 8px;
      right: 4px;
      z-index: 50;
    }
    /* Vistas */
    .tab-view {
      display: none;
      width: 100%;
      flex: 1;
      min-height: 0; /* fix crítico: permite que el chat hijo scrollee en Android */
      flex-direction: column;
      align-items: center;
      overflow: hidden;
    }
    .tab-view.active {
      display: flex;
    }
    .chat-theme-toggle {
      width: 38px;
      height: 38px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      border: none;
      background: transparent;
      color: #b9c6bf;          /* gris claro */
      cursor: pointer;
      border-radius: 50%;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
      transition: color 0.2s ease, background 0.2s ease;
    }
    .chat-theme-toggle:active { background: rgba(0,0,0,0.05); }
    html.tema-oscuro .chat-theme-toggle:active { background: rgba(255,255,255,0.08); }
    /* ============================================
       DASHBOARD — Próximamente
       ============================================ */
    .dashboard-coming-soon {
      flex: 1;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 24px;
      gap: 20px;
      animation: fadeInUp 0.4s ease-out;
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .dashboard-icon {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, #b7d3c6, #8fb5a3);
      border-radius: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.4rem;
      box-shadow: 0 8px 24px rgba(143, 181, 163, 0.35);
    }
    .dashboard-title {
      font-size: 1.4rem;
      font-weight: 800;
      color: #2f4f45;
      text-align: center;
      margin: 0;
    }
    .dashboard-subtitle {
      font-size: 0.98rem;
      color: #6b8e7d;
      text-align: center;
      line-height: 1.6;
      max-width: 280px;
      margin: 0;
    }
    /* Preview cards — placeholders de lo que vendrá */
    .dashboard-preview {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 8px;
    }
    .preview-card {
      width: 100%;
      background: white;
      border-radius: 16px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
      position: relative;
      overflow: hidden;
    }
    /* Efecto blur sobre las cards — simula que el contenido está "tapado" */
    .preview-card::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0.65);
      backdrop-filter: blur(3px);
      -webkit-backdrop-filter: blur(3px);
      border-radius: 16px;
    }
    .preview-card-icon {
      font-size: 1.6rem;
      flex-shrink: 0;
    }
    .preview-card-text {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    .preview-card-label {
      font-size: 0.85rem;
      font-weight: 700;
      color: #2f4f45;
    }
    .preview-card-sub {
      font-size: 0.75rem;
      color: #8fb5a3;
    }
    /* Barras de gráfico simuladas */
    .mock-bars {
      display: flex;
      align-items: flex-end;
      gap: 4px;
      height: 28px;
    }
    .mock-bar {
      width: 8px;
      border-radius: 4px;
      background: #b7d3c6;
    }
    .dashboard-note {
      font-size: 0.8rem;
      color: #a8c8b8;
      text-align: center;
      margin-top: 4px;
      font-style: italic;
    }

    /* ============================================
       OVERLAYS DE EJERCICIO — respiración y guiado
       ============================================ */
    .overlay-ejercicio {
      position: fixed;
      inset: 0;
      z-index: 300;
      background: #eaf4ef;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 24px;
      gap: 8px;
      overflow-y: auto;
    }
    .overlay-ejercicio.hidden {
      display: none;
    }
    .overlay-ejercicio h2 {
      color: #2f4f45;
      font-size: 1.3rem;
      font-weight: 800;
      text-align: center;
      margin: 0 0 4px;
    }
  </style>
</head>

<body>

<div class="app">

  <!-- ============================================
       BARRA DE NAVEGACIÓN — iconos de lado a lado, el activo se ensancha
       ============================================ -->
  <nav class="nav-bar" id="nav-bar" role="tablist" aria-label="Navegación">
    <button class="nav-bar-item active" data-sec="chat" onclick="navTo('chat')" aria-label="Chat">
      <svg viewBox="0 0 24 24"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
      <span class="nav-bar-label">Chat</span>
    </button>
    <button class="nav-bar-item" data-sec="ejercicios" onclick="navTo('ejercicios')" aria-label="Ejercicios">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="5.2" r="2.1"/><path d="M9.2 8.4C7.7 9.4 6.5 11 6.5 13.2"/><path d="M14.8 8.4c1.5 1 2.7 2.6 2.7 4.8"/><path d="M6 16.4c1.7 1.1 3.7 1.6 6 1.6s4.3-.5 6-1.6"/><path d="M8.7 15.6 12 14l3.3 1.6"/></svg>
      <span class="nav-bar-label">Ejercicios</span>
    </button>
    <button class="nav-bar-item" data-sec="dashboard" onclick="navTo('dashboard')" aria-label="Mi estado">
      <svg viewBox="0 0 24 24"><path d="M20.8 11.5a4.5 4.5 0 0 0-8.8-1.5 4.5 4.5 0 0 0-8.8 1.5c0 4 8.8 8.5 8.8 8.5s8.8-4.5 8.8-8.5z"/><path d="M3.5 12h3l1.5-3 2 5 1.5-2h2"/></svg>
      <span class="nav-bar-label">Mi estado</span>
    </button>
    <button class="nav-bar-item" data-sec="feedback" onclick="navTo('feedback')" aria-label="Tu opinión">
      <svg viewBox="0 0 24 24"><path d="M8 13a5 5 0 1 1 7.5 4.3L15 21l-2.2-1.4A5 5 0 0 1 8 13z"/><circle cx="10.5" cy="13" r="0.6"/><circle cx="12.5" cy="13" r="0.6"/><circle cx="14.5" cy="13" r="0.6"/></svg>
      <span class="nav-bar-label">Tu opinión</span>
    </button>
    <button class="nav-bar-item" data-sec="profile" onclick="navTo('profile')" aria-label="Mi perfil">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="3.2"/><path d="M5.5 20a6.5 6.5 0 0 1 13 0"/></svg>
      <span class="nav-bar-label">Mi perfil</span>
    </button>
  </nav>

  <!-- ============================================
       VISTA: CHAT
       ============================================ -->
  <div class="tab-view active" id="view-chat" style="position: relative;">

    <!-- Toggle de tema flotante, debajo de la barra -->
    <button
      class="chat-theme-toggle chat-theme-fab"
      id="chat-theme-toggle"
      onclick="alternarTemaChat()"
      aria-label="Cambiar tema"></button>

    <div class="bear-container" id="bear-container"></div>
    <div id="mood-indicator"></div>
    <div class="chat" id="chat"></div>

    <!-- INPUT + MIC -->
    <div class="input-container">
      <button
        class="mic-btn"
        id="mic-btn"
        onclick="toggleMic()"
        aria-label="Hablar con Numa">
        🎤
      </button>
      <input
        id="input"
        placeholder="Escribele a Numa..."
        autocomplete="off"
        onkeypress="if (event.key === 'Enter') enviarMensaje()"
      />
      <button class="btn-enviar" onclick="enviarMensaje()" aria-label="Enviar">↑</button>
    </div>


  </div>

  <!-- ============================================
       VISTA: DASHBOARD
       ============================================ -->
  <div class="tab-view" id="view-dashboard">
    <!-- Contenido cargado dinámicamente por dashboard.js -->
  </div>

  <!-- ============================================
       VISTA: PERFIL
       ============================================ -->
  <div class="tab-view" id="view-profile">
    <!-- Contenido cargado dinámicamente por profile.js -->
  </div>

  <!-- ============================================
       VISTA: TU OPINIÓN (feedback)
       ============================================ -->
  <div class="tab-view" id="view-feedback">
    <!-- Contenido cargado dinámicamente por feedbackTab.js -->
  </div>

  <!-- ============================================
       OVERLAYS Y MODALES
       ============================================ -->

  <!-- Pantalla de preparación antes del ejercicio -->
  <div id="prep-screen" class="prep-screen hidden">
    <div class="loader-circle"></div>
    <h2 id="prep-text">Preparando tu espacio...</h2>
  </div>

  <!-- Menú principal de ejercicios -->
  <div class="ejercicios-panel hidden" id="ejercicios-menu">
    <button class="close-btn" onclick="cerrarMenuEjercicios()">✕</button>
    <h2>¿Qué necesitás hoy?</h2>
    <p class="panel-subtitle">Elegí una práctica para este momento</p>
    <div id="lista-categorias"></div>
  </div>

  <!-- Submenú de detalle de ejercicio -->
  <div class="ejercicios-panel hidden" id="submenu-detalle">
    <button class="close-btn" onclick="volverAMenuPrincipal()">←</button>
    <h2 id="titulo-submenu">Categoría</h2>
    <div id="lista-ejercicios-detalle"></div>
  </div>

  <!-- ============================================
       OVERLAY — RESPIRACIÓN
       ✅ AGREGADO: faltaba en el HTML original
       ============================================ -->
  <div id="overlay-respiracion" class="overlay-ejercicio hidden">
    <button class="close-btn" onclick="detenerRespiracion()">✕</button>

    <h2 id="resp-titulo">Respiración</h2>

    <p id="resp-text-instruccion" style="
      color: #4a6a5e;
      font-size: 0.95rem;
      text-align: center;
      margin: 0 0 16px;
      max-width: 280px;
      line-height: 1.5;
    "></p>

    <!-- Círculo animado de respiración -->
    <div id="resp-circle" style="
      width: 150px;
      height: 150px;
      border-radius: 50%;
      background: rgba(183, 211, 198, 0.6);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 4s ease-in-out, background-color 4s;
      margin: 12px auto;
      box-shadow: 0 0 0 16px rgba(183, 211, 198, 0.15);
    "></div>

    <!-- Texto de fase: Inhalá / Sostené / Exhalá / Pausa -->
    <p id="resp-instruccion" style="
      font-size: 1.4rem;
      font-weight: 700;
      color: #2f4f45;
      text-align: center;
      margin: 8px 0 0;
      min-height: 2rem;
    "></p>

    <!-- Texto descriptivo del patrón -->
    <p id="resp-subtext" style="
      color: #6b8e7d;
      font-size: 0.82rem;
      font-style: italic;
      text-align: center;
      max-width: 260px;
      margin: 8px auto 0;
      line-height: 1.5;
    "></p>
  </div>

  <!-- ============================================
       OVERLAY — GUIADO (meditación / yoga)
       ✅ AGREGADO: faltaba en el HTML original
       ============================================ -->
  <div id="overlay-guiado" class="overlay-ejercicio hidden">
    <button class="close-btn" onclick="detenerGuiado()">✕</button>

    <h2 id="guiado-titulo">Ejercicio</h2>

    <!-- Timer — solo visible en meditación con duracion fija -->
    <div id="guiado-timer" class="hidden" style="
      font-size: 2.8rem;
      font-weight: 800;
      color: #2f4f45;
      text-align: center;
      margin: 8px 0;
      letter-spacing: 0.02em;
    ">0:00</div>

    <!-- Video de pose — solo visible en yoga -->
    <video
      id="numa-video-pose"
      autoplay
      loop
      muted
      playsinline
      style="
        display: none;
        width: 100%;
        max-width: 300px;
        border-radius: 16px;
        margin: 8px auto;
        box-shadow: 0 4px 16px rgba(0,0,0,0.08);
      "
    >
      <source id="numa-video-source" src="" type="video/mp4" />
    </video>

    <!-- Nombre del paso actual -->
    <p id="guiado-paso-principal" style="
      font-size: 1.25rem;
      font-weight: 700;
      color: #2f4f45;
      text-align: center;
      margin: 12px 0 6px;
      min-height: 1.6rem;
    "></p>

    <!-- Instrucción del paso -->
    <p id="guiado-instruccion" style="
      font-size: 0.95rem;
      color: #4a6a5e;
      text-align: center;
      line-height: 1.6;
      max-width: 290px;
      margin: 0 auto;
      min-height: 3rem;
    "></p>

    <!-- Barra de progreso del paso actual -->
    <div style="
      width: 100%;
      max-width: 300px;
      height: 4px;
      background: rgba(183, 211, 198, 0.35);
      border-radius: 4px;
      margin: 24px auto 0;
      overflow: hidden;
    ">
      <div id="guiado-progress" style="
        height: 100%;
        width: 0%;
        background: #7db89e;
        border-radius: 4px;
        transition: none;
      "></div>
    </div>
  </div>

  <!-- ============================================
       LECTURA
       ============================================ -->
  <div id="reading" class="overlay-ejercicio hidden">
    <button class="close-btn" onclick="closeReading()">✕</button>

    <!-- Badge del pack -->
    <div id="reading-pack-badge" style="
      background: rgba(183,211,198,0.25);
      border: 1.5px solid rgba(183,211,198,0.5);
      border-radius: 20px;
      padding: 5px 14px;
      font-size: 0.82rem;
      font-weight: 800;
      color: #4a6a5e;
      letter-spacing: 0.02em;
      margin-bottom: 8px;
    "></div>

    <!-- Decoración visual -->
    <div style="font-size: 2.2rem; opacity: 0.18; margin: 8px 0 4px; user-select:none;">"</div>

    <!-- Cita -->
    <p class="reading-quote" style="
      font-size: 1.1rem;
      color: #2f4f45;
      text-align: center;
      font-style: italic;
      line-height: 1.75;
      max-width: 300px;
      margin: 0 auto 16px;
      transition: opacity 0.2s ease;
    "></p>

    <!-- Autor -->
    <p class="reading-author" style="
      font-size: 0.88rem;
      color: #8fb5a3;
      text-align: center;
      font-weight: 700;
      letter-spacing: 0.02em;
      transition: opacity 0.2s ease;
    "></p>

    <!-- Contador y navegación -->
    <div style="
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 28px;
    ">
      <button onclick="prevReading()" style="
        padding: 10px 18px;
        background: rgba(183,211,198,0.3);
        border: none; border-radius: 12px;
        color: #4a6a5e; font-weight: 700;
        font-size: 0.9rem; cursor: pointer;
        font-family: inherit;
      ">← Ant.</button>

      <span id="reading-counter" style="
        font-size: 0.78rem;
        color: #b7d3c6;
        font-weight: 700;
        min-width: 36px;
        text-align: center;
      "></span>

      <button onclick="nextReading()" style="
        padding: 10px 18px;
        background: linear-gradient(135deg, #7db89e, #5a9e84);
        border: none; border-radius: 12px;
        color: white; font-weight: 700;
        font-size: 0.9rem; cursor: pointer;
        font-family: inherit;
      ">Sig. →</button>
    </div>
  </div>

</div><!-- /.app -->


<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="/static/bear3d.js"></script>
<script type="module" src="/static/app.js"></script>

<script>
  // ============================================
  // BARRA DE NAVEGACIÓN — navegación principal
  // ============================================
  const NAV_VIEWS = ['chat', 'dashboard', 'profile', 'feedback'];

  function navTo(sec) {
    // Ejercicios es un overlay: se abre encima de la vista actual.
    // No cambia la sección activa de la barra (queda marcada la anterior).
    if (sec === 'ejercicios') {
      if (window.irAEjercicios) window.irAEjercicios();
      return;
    }

    NAV_VIEWS.forEach(s => {
      document.getElementById('view-' + s)?.classList.toggle('active', s === sec);
    });
    document.querySelectorAll('.nav-bar-item').forEach(b => {
      b.classList.toggle('active', b.dataset.sec === sec);
    });

    if (sec === 'dashboard' && window.initDashboard) window.initDashboard();
    if (sec === 'profile'   && window.initProfile)   window.initProfile();
    if (sec === 'feedback'  && window.initFeedback)  window.initFeedback();
  }

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js');
  }
</script>

<div id="mic-toast" class="mic-toast hidden">
  🎧 Numa te está escuchando…
</div>

</body>
</html>
